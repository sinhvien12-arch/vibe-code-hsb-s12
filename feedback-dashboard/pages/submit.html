<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gửi Phản Hồi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body class="bg-gray-50">
  <nav id="navbar-container"></nav>

  <main class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto">
      <h1 class="text-3xl font-bold text-gray-900 mb-6">Gửi Phản Hồi Của Bạn</h1>

      <div class="bg-white rounded-lg shadow-md p-8">
        <form id="feedback-form" class="space-y-6">
          <!-- Name Field -->
          <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
              Tên (Tùy chọn)
            </label>
            <input
              type="text"
              id="name"
              name="name"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
              placeholder="Nhập tên của bạn"
            />
          </div>

          <!-- Location Field -->
          <div>
            <label for="location" class="block text-sm font-medium text-gray-700 mb-2">
              Địa Điểm <span class="text-red-500">*</span>
            </label>
            <select
              id="location"
              name="location"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
            >
              <option value="">-- Chọn địa điểm --</option>
              <option value="district-1">Quận 1</option>
              <option value="district-3">Quận 3</option>
              <option value="thao-dien">Thảo Điền</option>
            </select>
          </div>

          <!-- Rating Field -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-3">
              Đánh Giá <span class="text-red-500">*</span>
            </label>
            <div class="flex gap-2" id="rating-group">
              <button
                type="button"
                class="rating-btn w-12 h-12 rounded-lg border-2 border-gray-300 text-2xl hover:border-yellow-400 focus:outline-none transition"
                data-rating="1"
                title="Rất không hài lòng"
              >
                😞
              </button>
              <button
                type="button"
                class="rating-btn w-12 h-12 rounded-lg border-2 border-gray-300 text-2xl hover:border-yellow-400 focus:outline-none transition"
                data-rating="2"
                title="Không hài lòng"
              >
                😕
              </button>
              <button
                type="button"
                class="rating-btn w-12 h-12 rounded-lg border-2 border-gray-300 text-2xl hover:border-yellow-400 focus:outline-none transition"
                data-rating="3"
                title="Bình thường"
              >
                😐
              </button>
              <button
                type="button"
                class="rating-btn w-12 h-12 rounded-lg border-2 border-gray-300 text-2xl hover:border-yellow-400 focus:outline-none transition"
                data-rating="4"
                title="Hài lòng"
              >
                😊
              </button>
              <button
                type="button"
                class="rating-btn w-12 h-12 rounded-lg border-2 border-gray-300 text-2xl hover:border-yellow-400 focus:outline-none transition"
                data-rating="5"
                title="Rất hài lòng"
              >
                😍
              </button>
            </div>
            <input type="hidden" id="rating" name="rating" required />
          </div>

          <!-- Comment Field -->
          <div>
            <label for="comment" class="block text-sm font-medium text-gray-700 mb-2">
              Bình Luận <span class="text-red-500">*</span>
            </label>
            <textarea
              id="comment"
              name="comment"
              required
              rows="5"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
              placeholder="Chia sẻ ý kiến chi tiết của bạn..."
            ></textarea>
            <p class="text-xs text-gray-500 mt-1">Tối thiểu 10 ký tự</p>
          </div>

          <!-- Success Message -->
          <div id="success-message" class="hidden bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg">
            ✓ Cảm ơn! Phản hồi của bạn đã được gửi thành công.
          </div>

          <!-- Error Message -->
          <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg"></div>

          <!-- Submit Button -->
          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition"
          >
            Gửi Phản Hồi
          </button>
        </form>
      </div>
    </div>
  </main>

  <script src="../shared/utils.js"></script>
  <script src="../shared/navbar.js"></script>
  <script src="../shared/submit-form.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderNavbar('submit');
      initSubmitForm();
    });
  </script>
</body>
</html>
