<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng Quản Trị Phản Hồi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body class="bg-gray-50">
  <nav id="navbar-container"></nav>

  <main class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-900 mb-6">Bảng Quản Trị Phản Hồi</h1>

    <!-- Filters Section -->
    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
      <h2 class="text-lg font-semibold text-gray-900 mb-4">Bộ Lọc</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <!-- Location Filter -->
        <div>
          <label for="filter-location" class="block text-sm font-medium text-gray-700 mb-2">
            Địa Điểm
          </label>
          <select
            id="filter-location"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm"
          >
            <option value="">Tất cả</option>
            <option value="district-1">Quận 1</option>
            <option value="district-3">Quận 3</option>
            <option value="thao-dien">Thảo Điền</option>
          </select>
        </div>

        <!-- Minimum Rating Filter -->
        <div>
          <label for="filter-rating" class="block text-sm font-medium text-gray-700 mb-2">
            Đánh Giá Tối Thiểu
          </label>
          <select
            id="filter-rating"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm"
          >
            <option value="">Tất cả</option>
            <option value="1">1+ ⭐</option>
            <option value="2">2+ ⭐</option>
            <option value="3">3+ ⭐</option>
            <option value="4">4+ ⭐</option>
            <option value="5">5 ⭐</option>
          </select>
        </div>

        <!-- Date From -->
        <div>
          <label for="filter-from" class="block text-sm font-medium text-gray-700 mb-2">
            Từ Ngày
          </label>
          <input
            type="date"
            id="filter-from"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm"
          />
        </div>

        <!-- Date To -->
        <div>
          <label for="filter-to" class="block text-sm font-medium text-gray-700 mb-2">
            Đến Ngày
          </label>
          <input
            type="date"
            id="filter-to"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm"
          />
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex gap-3 mt-4">
        <button
          id="filter-btn"
          class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition"
        >
          Áp Dụng
        </button>
        <button
          id="reset-btn"
          class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-6 rounded-lg transition"
        >
          Đặt Lại
        </button>
        <button
          id="export-btn"
          class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-6 rounded-lg transition ml-auto"
        >
          Xuất CSV
        </button>
      </div>
    </div>

    <!-- Stats Section -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-white rounded-lg shadow-md p-4">
        <p class="text-sm text-gray-600">Tổng Phản Hồi</p>
        <p id="stat-total" class="text-2xl font-bold text-gray-900">0</p>
      </div>
      <div class="bg-white rounded-lg shadow-md p-4">
        <p class="text-sm text-gray-600">Đánh Giá Trung Bình</p>
        <p id="stat-avg" class="text-2xl font-bold text-gray-900">0.0</p>
      </div>
      <div class="bg-white rounded-lg shadow-md p-4">
        <p class="text-sm text-gray-600">Tích Cực</p>
        <p id="stat-positive" class="text-2xl font-bold text-green-600">0%</p>
      </div>
    </div>

    <!-- Table Section -->
    <div class="bg-white rounded-lg shadow-md overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-100 border-b border-gray-200">
            <tr>
              <th class="px-4 py-3 text-left font-semibold text-gray-700">Địa Điểm</th>
              <th class="px-4 py-3 text-left font-semibold text-gray-700">Đánh Giá</th>
              <th class="px-4 py-3 text-left font-semibold text-gray-700">Bình Luận</th>
              <th class="px-4 py-3 text-left font-semibold text-gray-700">Tên</th>
              <th class="px-4 py-3 text-left font-semibold text-gray-700">Ngày Giờ</th>
            </tr>
          </thead>
          <tbody id="feedback-table-body">
            <tr>
              <td colspan="5" class="px-4 py-8 text-center text-gray-500">
                Đang tải dữ liệu...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden bg-white rounded-lg shadow-md p-12 text-center mt-6">
      <p class="text-lg text-gray-600">Không có phản hồi nào phù hợp với bộ lọc.</p>
    </div>
  </main>

  <script src="../shared/utils.js"></script>
  <script src="../shared/navbar.js"></script>
  <script src="../shared/admin-table.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderNavbar('admin');
      initAdminTable();
    });
  </script>
</body>
</html>
